<!doctype html>
<html lang="en" data-theme="light" class="scroll-smooth">
<head>
  <meta charset="utf-8">
  <title>Invitación Boda</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    html {
      height: 100%;
    }
    body {
      position: relative;
      min-height: 100vh;
      background-color: #efe7de;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url('/assets/branding/fondo02-cel-scaled.jpg');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      z-index: 0;
      pointer-events: none;
    }
    body > app-root {
      position: relative;
      z-index: 1;
      display: block;
    }
    #app-start-loader {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: grid;
      place-items: center;
      background: rgba(239, 231, 222, 0.88);
      backdrop-filter: blur(2px);
      transition: opacity 260ms ease;
    }
    #app-start-loader.is-hidden {
      opacity: 0;
      pointer-events: none;
    }
    #app-start-loader .spinner {
      width: 56px;
      height: 56px;
      border-radius: 999px;
      border: 4px solid rgba(149, 120, 69, 0.28);
      border-top-color: #957845;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body class="min-h-screen w-full font-[Nunito_Sans,Segoe_UI,Tahoma,Geneva,Verdana,sans-serif] text-[#5a5047]">
  <div id="app-start-loader" aria-label="Cargando">
    <div class="spinner" aria-hidden="true"></div>
  </div>
  <app-root></app-root>
</body>
</html>
