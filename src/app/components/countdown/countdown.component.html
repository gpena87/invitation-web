 <section id="cuenta" class="mx-auto max-w-6xl px-4 py-10 sm:px-6 lg:px-8">
    <div class="p-8">
      <p class="text-xs font-semibold uppercase tracking-[0.2em] text-[#c4a89f]">{{ title() }}</p>
      <h2 class="mt-2 text-3xl font-semibold text-[#5a5047]">{{ subtitle() }}</h2>
      <div class="mt-8 grid grid-cols-2 gap-4 sm:grid-cols-4">
        <div class="rounded-2xl bg-white/80 p-4">
          <p class="text-3xl font-semibold text-[#5a5047]">{{ days() }}</p>
          <p class="text-sm text-[#9f8b7f]">Dias</p>
        </div>
        <div class="rounded-2xl bg-white/80 p-4">
          <p class="text-3xl font-semibold text-[#5a5047]">{{ hours() }}</p>
          <p class="text-sm text-[#9f8b7f]">Horas</p>
        </div>
        <div class="rounded-2xl bg-white/80 p-4">
          <p class="text-3xl font-semibold text-[#5a5047]">{{ minutes() }}</p>
          <p class="text-sm text-[#9f8b7f]">Minutos</p>
        </div>
        <div class="rounded-2xl bg-white/80 p-4">
          <p class="text-3xl font-semibold text-[#5a5047]">{{ seconds() }}</p>
          <p class="text-sm text-[#9f8b7f]">Segundos</p>
        </div>
      </div>
    </div>
  </section>
