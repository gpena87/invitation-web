 <section id="cuenta" class="mx-auto max-w-6xl bg-transparent px-4 py-10 text-center sm:px-6 lg:px-8">
   <div class="p-5 text-center sm:p-8">
      <p class="text-base font-semibold uppercase tracking-widest text-[#957845]">{{ title() }}</p>
      <h2 class="mt-2 text-4xl font-light text-[#957845] sm:text-5xl tracking-wider">{{ subtitle() }}</h2>
      <div class="mt-8 grid grid-cols-2 gap-4 sm:grid-cols-4">
        <div class="rounded-2xl bg-white/25 p-3 sm:p-4">
          <p class="text-4xl font-semibold text-[#957845] sm:text-4xl">{{ days() }}</p>
          <p class="text-base text-[#957845]">Dias</p>
        </div>
        <div class="rounded-2xl bg-white/25 p-3 sm:p-4">
          <p class="text-4xl font-semibold text-[#957845] sm:text-4xl">{{ hours() }}</p>
          <p class="text-base text-[#957845]">Horas</p>
        </div>
        <div class="rounded-2xl bg-white/25 p-3 sm:p-4">
          <p class="text-4xl font-semibold text-[#957845] sm:text-4xl">{{ minutes() }}</p>
          <p class="text-base text-[#957845]">Minutos</p>
        </div>
        <div class="rounded-2xl bg-white/25 p-3 sm:p-4">
          <p class="text-4xl font-semibold text-[#957845] sm:text-4xl">{{ seconds() }}</p>
          <p class="text-base text-[#957845]">Segundos</p>
        </div>
      </div>
    </div>
  </section>
