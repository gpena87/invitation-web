  <section id="inicio" class="relative overflow-hidden">
    <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top,rgba(251,191,36,0.18),transparent_55%)]"></div>
    <div class="mx-auto grid max-w-6xl gap-10 px-4 py-16 sm:px-6 lg:grid-cols-2 lg:items-center lg:px-8 lg:py-24">
      <div>
        <p class="mb-4 inline-flex rounded-full bg-rose-100 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-rose-700">
          {{ title() }}
        </p>
        <h1 class="text-4xl font-semibold leading-tight text-stone-900 sm:text-5xl">
          {{ subtitle() }}
        </h1>
        <p class="mt-5 max-w-xl text-base leading-relaxed text-stone-600 sm:text-lg">
          {{ subtitle2() }}
        </p>
      </div>

      <div class="rounded-3xl border border-amber-200/70 bg-white/70 p-3 shadow-xl shadow-amber-100/70 backdrop-blur">
        <img
          src="assets/branding/iniciales-naturalnude.svg"
          alt="Iniciales de los novios"
          loading="lazy"
          decoding="async"
          class="mx-auto h-72 w-full rounded-2xl object-contain bg-linear-to-b from-amber-50 to-rose-50 p-8"
        />
      </div>
    </div>
  </section>
