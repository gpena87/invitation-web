<section id="itinerario" class="mx-auto max-w-6xl px-4 py-10 sm:px-6 lg:px-8">
  <div class="bg-transparent p-8">
    <p class="text-xs font-semibold uppercase tracking-[0.2em] text-[#c4a89f]">Agenda del dia</p>
    <h2 class="mt-2 text-3xl font-semibold text-[#5a5047]">{{ title() }}</h2>
    <p class="mt-3 text-[#7a6a61]">{{ subtitle() }}</p>

    <div class="mt-8 grid gap-4 sm:grid-cols-3">
      <article class="p-5">
        <img
          src="assets/branding/itinerary-ceremonia-v3.svg"
          alt="Imagen de ceremonia"
          class="h-28 w-full object-cover"
          loading="lazy"
          decoding="async"
        />
        <p class="mt-4 text-xs font-semibold uppercase tracking-wider text-[#9f8b7f]">16:30</p>
        <h3 class="mt-2 text-lg font-semibold text-[#5a5047]">Ceremonia</h3>
        <p class="mt-2 text-sm text-[#7a6a61]">Parroquia Santa Maria de Las Condes.</p>
      </article>

      <article class="p-5">
        <img
          src="assets/branding/itinerary-coctel-v3.svg"
          alt="Imagen de coctel"
          class="h-28 w-full object-cover"
          loading="lazy"
          decoding="async"
        />
        <p class="mt-4 text-xs font-semibold uppercase tracking-wider text-[#9f8b7f]">18:30</p>
        <h3 class="mt-2 text-lg font-semibold text-[#5a5047]">Coctel</h3>
        <p class="mt-2 text-sm text-[#7a6a61]">Parroquia Santa Maria de Las Condes.</p>
      </article>

      <article class="p-5">
        <img
          src="assets/branding/itinerary-celebracion-v3.svg"
          alt="Imagen de celebracion"
          class="h-28 w-full object-cover"
          loading="lazy"
          decoding="async"
        />
        <p class="mt-4 text-xs font-semibold uppercase tracking-wider text-[#9f8b7f]">20:30</p>
        <h3 class="mt-2 text-lg font-semibold text-[#5a5047]">Celebracion</h3>
        <p class="mt-2 text-sm text-[#7a6a61]">Parroquia Santa Maria de Las Condes.</p>
      </article>
    </div>
  </div>
</section>
