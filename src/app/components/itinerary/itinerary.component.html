<section id="itinerario" class="mx-auto max-w-6xl px-4 py-10 sm:px-6 lg:px-8">
  <div class="bg-transparent p-5 text-center sm:p-8">
    <p class="text-base font-semibold uppercase tracking-widest text-[#957845]">Agenda del dia</p>
    <h2 class="mt-2 text-5xl font-light text-[#957845] sm:text-6xl tracking-wider">{{ title() }}</h2>
    <p class="mt-3 text-[#957845]">{{ subtitle() }}</p>
    <div class="mt-8 flex justify-center">
      <article class="w-full max-w-md p-5 text-center">
        <img
          src="assets/branding/programacion.png"
          alt="Imagen de ceremonia"
          class="mx-auto h-auto w-full object-contain sm:h-80 sm:object-cover lg:h-112"
          loading="lazy"
          decoding="async"
        />
        <p class="mt-4 text-base font-semibold uppercase tracking-wider text-[#957845]">16:30</p>
        <h3 class="mt-2 text-xl font-semibold text-[#957845]">Ceremonia</h3>
        <p class="mt-2 text-base text-[#957845]">Parroquia Santa Maria de Las Condes.</p>
      </article>
    </div>
  </div>
</section>
