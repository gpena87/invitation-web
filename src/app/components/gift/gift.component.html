<section id="regalos" class="mx-auto max-w-6xl px-4 py-12 sm:px-6 lg:px-8">
  <div class="p-8">
    <p class="text-xs font-semibold uppercase tracking-[0.2em] text-[#c4a89f]">{{ title() }}</p>
    <h2 class="mt-2 text-3xl font-semibold text-[#5a5047]">{{ subtitle() }}</h2>
    <p class="mt-4 text-base leading-relaxed text-[#7a6a61]">{{ subtitle2() }}</p>
    <div class="mt-4 space-y-3 text-sm text-[#7a6a61]">
      <p><strong>Banco:</strong> {{ bankAccount().bank }}</p>
      <p><strong>Titular:</strong> {{ bankAccount().accountHolder }}</p>
      <p><strong>Cuenta:</strong> {{ bankAccount().accountNumber }}</p>
      <p><strong>Email:</strong> {{ bankAccount().email }}</p>
    </div>
    <button
      type="button"
      (click)="copyBankDetails()"
      class="mt-6 block w-fit mx-auto rounded-full bg-[#c4a89f] px-5 py-2.5 text-sm font-medium uppercase tracking-wider text-white transition-all duration-300 hover:-translate-y-0.5 hover:bg-[#b39685] hover:shadow-lg"
    >
      Copiar Datos Bancarios
    </button>
    <p class="mt-3 text-center text-sm text-[#7a6a61]" [class.hidden]="!copiedMessage()">{{ copiedMessage() }}</p>
  </div>
</section>
