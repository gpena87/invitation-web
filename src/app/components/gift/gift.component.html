<section id="regalos" class="mx-auto max-w-6xl px-4 py-12 sm:px-6 lg:px-8">
  <div class="p-8">
    <p class="text-xs font-semibold uppercase tracking-[0.2em] text-[#c4a89f]">Regalo</p>
    <h2 class="mt-2 text-3xl font-semibold text-[#5a5047]">{{ title() }}</h2>
    <p class="mt-4 text-base leading-relaxed text-[#7a6a61]">{{ subtitle() }}</p>
    <div class="mt-8 grid gap-6 sm:grid-cols-2">
      <div class="p-6">
        <h3 class="text-lg font-semibold text-[#5a5047]">Transferencia Bancaria</h3>
        <!-- <div class="mt-4 space-y-3 text-sm text-[#7a6a61]"> -->
          <p><strong>Banco:</strong> {{ bankAccount().bank }}</p>
          <p><strong>Titular:</strong> {{ bankAccount().accountHolder }}</p>
          <p><strong>Cuenta:</strong> {{ bankAccount().accountNumber }}</p>
          <p><strong>Email:</strong> {{ bankAccount().email }}</p>
        <!-- </div> -->
      </div>
    </div>
  </div>
</section>
