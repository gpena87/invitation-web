<section id="regalos" class="mx-auto max-w-6xl px-4 py-12 sm:px-6 lg:px-8">
  <div class="flex justify-center text-center">
    <div class="w-full max-w-2xl p-5 text-center sm:p-8">
      <img
        src="assets/branding/regalo.png"
        alt="Ilustracion de regalos"
        class="mx-auto h-44 w-full max-w-xs object-contain sm:h-52"
        loading="lazy"
        decoding="async"
      />
      <p class="text-base font-semibold uppercase tracking-widest text-[#957845]">{{ title() }}</p>
      <h2 class="mt-2 text-5xl font-light text-[#957845] sm:text-6xl tracking-wider">{{ subtitle() }}</h2>
      <p class="mt-4 text-base leading-relaxed text-[#957845]">{{ subtitle2() }}</p>
      <div class="mt-4 space-y-3 text-base text-[#957845]">
        <p><strong>Banco:</strong> {{ bankAccount().bank }}</p>
        <p><strong>Titular:</strong> {{ bankAccount().accountHolder }}</p>
        <p><strong>Cuenta:</strong> {{ bankAccount().accountNumber }}</p>
        <p><strong>Email:</strong> {{ bankAccount().email }}</p>
      </div>
      <button
        type="button"
        (click)="copyBankDetails()"
        class="mt-6 inline-block rounded-full bg-[#957845] px-8 py-3 text-base font-medium uppercase tracking-wider text-white transition-all duration-300 hover:bg-[#7d5f35] hover:shadow-lg shadow-md"
      >
        Copiar Datos Bancarios
      </button>
      <p class="mt-3 text-base text-[#957845]" [class.hidden]="!copiedMessage()">{{ copiedMessage() }}</p>
    </div>
  </div>
</section>
