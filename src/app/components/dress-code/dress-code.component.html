<section id="dress-code" class="mx-auto max-w-6xl bg-transparent px-4 py-10 sm:px-6 lg:px-8">
  <div class="bg-transparent p-5 text-center sm:p-8">
    <p class="text-base font-semibold uppercase tracking-widest text-[#957845]">Codigo de vestimenta</p>
    <h2 class="mt-2 text-5xl font-light text-[#957845] sm:text-6xl tracking-wider">{{ title() }}</h2>
    <p class="mt-3 text-[#957845]">{{ subtitle() }}</p>

    <div class="mt-8 flex justify-center">
      <article class="w-full max-w-md overflow-hidden text-center transition-transform duration-300 hover:-translate-y-1">
        <img
          src="assets/branding/dresscode20.webp"
          alt="Referencia de traje formal para ellos"
          class="h-48 w-full object-contain sm:h-56"
          loading="lazy"
          decoding="async"
        />
        <div class="p-5">
          <h3 class="text-xl font-semibold text-[#957845]">Ellos</h3>
          <p class="mt-2 text-base leading-relaxed text-[#957845]">Traje formal, camisa y zapatos de vestir.</p>
        </div>
      </article>
    </div>
  </div>
</section>
