<section id="dress-code" class="mx-auto max-w-6xl px-4 py-10 sm:px-6 lg:px-8">
  <div class="bg-transparent p-8">
    <p class="text-xs font-semibold uppercase tracking-[0.2em] text-[#c4a89f]">Codigo de vestimenta</p>
    <h2 class="mt-2 text-3xl font-semibold text-[#5a5047]">{{ title() }}</h2>
    <p class="mt-3 text-[#7a6a61]">{{ subtitle() }}</p>

    <div class="mt-8 grid gap-5 sm:grid-cols-2">
      <article class="overflow-hidden transition-transform duration-300 hover:-translate-y-1">
        <img
          src="assets/branding/dresscode20.webp"
          alt="Referencia de traje formal para ellos"
          class="h-40 w-full object-cover"
          loading="lazy"
          decoding="async"
        />
        <div class="p-5">
          <h3 class="text-lg font-semibold text-[#5a5047]">Ellos</h3>
          <p class="mt-2 text-sm leading-relaxed text-[#7a6a61]">Traje formal, camisa y zapatos de vestir.</p>
        </div>
      </article>
    </div>
  </div>
</section>
