<section id="musica" class="mx-auto max-w-6xl px-4 py-10 sm:px-6 lg:px-8">
  <div class="p-8">
      <h2 class="text-2xl font-semibold text-[#5a5047]">{{ title() }}</h2>
      <p class="mt-3 text-[#7a6a61]">{{ subtitle() }}</p>
      <div class="mt-8 w-full max-w-sm mx-auto">
        <iframe
          title="Playlist de Spotify"
          [src]="spotifyAutoplayEmbedUrl"
          loading="eager"
          width="100%"
          height="382"
          frameborder="0"
          allowfullscreen=""
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          referrerpolicy="strict-origin-when-cross-origin"
          class="block w-full border-0"
        ></iframe>
      </div>
    </div>
</section>
