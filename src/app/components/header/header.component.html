<audio #bgAudio preload="auto" loop style="display: none;">
  <source src="assets/branding/good_b_music-emotional-cinematic-inspirational-piano-loop-199566.mp3" type="audio/mpeg" />
</audio>
<header
  class="sticky top-0 z-20 border-b border-[#957845]/20 bg-[#f8f6f3]/30 backdrop-blur transition-transform duration-300"
  [class.-translate-y-full]="isHeaderHidden()"
>
  <button
    (click)="toggleAudio()"
    type="button"
    class="absolute top-4 right-4 z-50 p-2 rounded-full bg-[#957845] text-white hover:bg-[#8a6a39] transition-colors opacity-100 pointer-events-auto"
    title="Activar/Desactivar sonido"
    style="outline: none; border: none; cursor: pointer;"
  >
    <svg *ngIf="isMuted()" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <line x1="23" y1="9" x2="17" y2="15"></line>
      <line x1="17" y1="9" x2="23" y2="15"></line>
    </svg>
    <svg *ngIf="!isMuted()" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <path d="M15.54 3.54a9 9 0 0 1 0 12.72M19.07 4.93a13 13 0 0 1 0 14.14"></path>
    </svg>
  </button>
  <nav class="mx-auto max-w-6xl px-4 py-3 sm:px-6 lg:px-8">
    <div class="flex items-center justify-center gap-3">
      <a href="#inicio" class="shrink-0 text-base font-semibold tracking-wide text-[#957845] sm:text-xl">Natural Nude</a>
    </div>
    <ul class="mt-3 flex justify-center gap-2 overflow-x-auto pb-1 text-base font-medium text-[#957845] sm:text-base md:mt-0 md:gap-6 md:overflow-visible md:pb-0">
      <li class="shrink-0"><a class="block rounded-full border border-[#957845]/50 bg-white/25 px-3 py-1.5 transition-colors duration-200 hover:text-[#957845] md:border-0 md:bg-transparent md:px-0 md:py-0" href="#regalos">Regalos</a></li>
      <li class="shrink-0"><a class="block rounded-full border border-[#957845]/50 bg-white/25 px-3 py-1.5 transition-colors duration-200 hover:text-[#957845] md:border-0 md:bg-transparent md:px-0 md:py-0" href="#confirmacion">Confirmación</a></li>
    </ul>
  </nav>
</header>
