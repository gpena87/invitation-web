 <section class="mx-auto grid max-w-6xl gap-6 px-4 pb-10 sm:px-6 lg:grid-cols-2 lg:px-8">
    <article id="ceremonia" class="bg-transparent p-6 sm:p-8">
      <p class="mb-2 text-xs font-semibold uppercase tracking-[0.2em] text-[#c4a89f]">{{ addressDescription() }}</p>
      <h2 class="text-2xl font-semibold text-[#5a5047]">{{ addressDescription() }}</h2>
      <p class="mt-3 text-[#7a6a61]">{{ addressDetail() }}</p>
      <a
        [href]="addressLink()"
        target="_blank"
        rel="noopener noreferrer"
        class="mt-6 block w-fit mx-auto rounded-full bg-[#c4a89f] px-5 py-2.5 text-sm font-medium uppercase tracking-[0.05em] text-white transition-all duration-300 hover:-translate-y-0.5 hover:bg-[#b39685] hover:shadow-lg"
      >
        Abrir en Google Maps
      </a>
    </article>
  </section>
