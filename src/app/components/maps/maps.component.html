 <section class="mx-auto flex flex-col items-center justify-center max-w-6xl gap-6 px-4 pb-10 text-center sm:px-6 lg:px-8">
   <article id="ceremonia" class="bg-transparent p-5 text-center sm:p-8 max-w-md">
      <p class="mb-2 text-base font-semibold uppercase tracking-widest text-[#957845]">{{ addressDescription() }}</p>
      <h2 class="text-5xl font-light text-[#957845] sm:text-6xl tracking-wider">{{ addressDescription() }}</h2>
      <p class="mt-4 text-base leading-relaxed text-[#957845]">{{ addressDetail() }}</p>
      <a
        [href]="addressLink()"
        target="_blank"
        rel="noopener noreferrer"
        class="mt-8 inline-block rounded-full bg-[#957845] px-8 py-3 text-center text-base font-medium uppercase tracking-wider text-white transition-all duration-300 hover:shadow-lg hover:bg-[#7d5f35] shadow-md"
      >
        Abrir en Google Maps
      </a>
    </article>
  </section>
