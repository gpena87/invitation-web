<section class="form-shell">
  <h1>Confirma tu asistencia</h1>
  <p class="subtitle">Completa tus datos para registrar tu respuesta.</p>

  <form [formGroup]="userForm" (ngSubmit)="onSubmit()" novalidate>
    <label for="name">Nombre</label>
    <input id="name" type="text" formControlName="name" placeholder="Ej. Ana" />
    <small *ngIf="userForm.controls.name.touched && userForm.controls.name.invalid">
      Ingresa un nombre valido.
    </small>

    <label for="lastName">Apellido</label>
    <input id="lastName" type="text" formControlName="lastName" placeholder="Ej. Perez" />
    <small *ngIf="userForm.controls.lastName.touched && userForm.controls.lastName.invalid">
      Ingresa un apellido valido.
    </small>

    <label for="email">Correo</label>
    <input id="email" type="email" formControlName="email" placeholder="correo@ejemplo.com" />
    <small *ngIf="userForm.controls.email.touched && userForm.controls.email.invalid">
      Ingresa un correo valido.
    </small>

    <label for="numberPhone">Telefono</label>
    <input id="numberPhone" type="tel" formControlName="numberPhone" placeholder="999 999 999" />
    <small *ngIf="userForm.controls.numberPhone.touched && userForm.controls.numberPhone.invalid">
      Ingresa un numero de telefono valido.
    </small>

    <label for="restriccion">Restriccion alimentaria (opcional)</label>
    <textarea
      id="restriccion"
      rows="3"
      formControlName="restriccion"
      placeholder="Ej. vegetariano, sin gluten"
    ></textarea>

    <button type="submit" [disabled]="userForm.invalid || isSubmitting()">
      {{ isSubmitting() ? 'Enviando...' : 'Enviar' }}
    </button>
  </form>

  <p class="success" *ngIf="successMessage()">{{ successMessage() }}</p>
  <p class="error" *ngIf="errorMessage()">{{ errorMessage() }}</p>
</section>
